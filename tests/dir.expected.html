<!DOCTYPE html>
<html data-theme="dark">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<meta http-equiv="X-UA-Compatible" content="ie=edge">
	<title>testdir</title>
	<meta charset="utf-8">
	<link rel="stylesheet" id="theme-dark" href="{markserv}templates/github-markdown-dark.css">
	<link rel="stylesheet" id="theme-light" href="{markserv}templates/github-markdown-light.css" disabled>
	<link rel="stylesheet" id="theme-synthwave" href="{markserv}templates/github-markdown-synthwave.css" disabled>
	<link rel="stylesheet" id="theme-solarized" href="{markserv}templates/github-markdown-solarized.css" disabled>
	<link rel="stylesheet" href="{markserv}templates/markserv.css">
	<link rel="stylesheet" href="{markserv}templates/highlight-js-github-gist.css">
	<link rel="stylesheet" href="{markserv}icons/icons.css">
</head>
<body class="dir">
<article class="markdown-body">
<h1 class="icon folder isfolder"><a href="/">./</a><a href="/tests/">tests/</a><a href="/tests/testdir/">testdir/</a></h1>
<ul>
	<li class="icon markdown isfile"><a href="file1.md">file1.md</a></li> 
	<li class="icon document isfile"><a href="file2.txt">file2.txt</a></li> 
</ul>

<footer><sup><hr> Served by <a href="https://www.npmjs.com/package/markserv">MarkServ</a> | PID: 58957</sup></footer>
</article>
<button class="theme-toggle" id="theme-toggle" title="Toggle theme"></button>
<script>
(function() {
	var themes = ['dark', 'light', 'synthwave', 'solarized'];
	var icons = {dark: '\u{1F319}', light: '\u{2600}\u{FE0F}', synthwave: '\u{1F9D1}\u{200D}\u{1F3A4}', solarized: '\u{262F}\u{FE0F}'};
	var serverTheme = 'dark' || 'dark';
	var current = localStorage.getItem('markserv-theme') || serverTheme;

	function applyTheme(t) {
		document.documentElement.setAttribute('data-theme', t);
		themes.forEach(function(name) {
			var el = document.getElementById('theme-' + name);
			if (el) el.disabled = (name !== t);
		});
		var btn = document.getElementById('theme-toggle');
		if (btn) btn.textContent = icons[t] || icons.dark;
		current = t;
	}

	applyTheme(current);

	document.getElementById('theme-toggle').addEventListener('click', function() {
		var idx = themes.indexOf(current);
		var next = themes[(idx + 1) % themes.length];
		localStorage.setItem('markserv-theme', next);
		applyTheme(next);
	});
})();
</script>
</body>
</html>
